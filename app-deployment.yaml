apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-application
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-app
  template:
    metadata:
      labels:
        app: core-app
    spec:
      containers:
      - name: app
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install redis flask
          cat << 'EOF' > app.py
          from flask import Flask
          import redis
          import os

          app = Flask(__name__)
          REDIS_PASSWORD = os.environ.get("REDIS_PASSWORD")

          @app.route('/')
          def index():
              try:
                  r = redis.Redis(host='redis-service', port=6379, password=REDIS_PASSWORD, socket_timeout=2)
                  r.ping()
                  return "Application Healthy! Data Layer Online.\n", 200
              except redis.exceptions.AuthenticationError:
                  return "HTTP 503 - Internal Service Error: Redis Authentication Failed\n", 503
              except Exception as e:
                  return f"HTTP 503 - Internal Service Error: {str(e)}\n", 503

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=8080)
          EOF
          python app.py
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: redis-password
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: core-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: core-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
